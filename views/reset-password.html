<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Reset Password - metropages</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-[#1d9bf0]">metropages</h1>
                <p class="text-slate-500 text-sm mt-1">Create new password</p>
            </div>
            
            <form hx-post="/reset-password" hx-target="#result" class="space-y-4">
                <input type="hidden" name="token" value="{{.Token}}">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">New Password</label>
                    <input type="password" name="password" required minlength="6" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                    <p class="text-xs text-slate-400 mt-1">Minimum 6 characters</p>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white font-semibold py-2 rounded-xl hover:bg-emerald-700 transition">Reset Password</button>
            </form>
            
            <div id="result" class="mt-4"></div>
        </div>
    </div>
</body>
</html>
