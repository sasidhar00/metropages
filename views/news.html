<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed - metropages</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .metro-brand { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 900; 
            letter-spacing: -2.5px; 
            text-transform: lowercase;
        }
        .news-card:hover {
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div class="max-w-4xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="metro-brand text-3xl text-[#1d9bf0]">metropages</h1>
                <p class="text-slate-500">Latest News & Updates</p>
            </div>
            <a href="/" class="bg-[#1d9bf0] text-white px-6 py-2 rounded-full hover:bg-[#1a8cd8] transition">← Back to Home</a>
        </div>

        <!-- News Grid -->
        <div class="space-y-4">
            {{range .News}}
            <div class="bg-white rounded-2xl shadow-sm hover:shadow-md transition-all news-card overflow-hidden">
                <div class="p-6">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="inline-flex items-center px-3 py-1 text-xs font-bold rounded-full 
                                    {{if eq .Category "real-estate"}}bg-blue-100 text-blue-700{{else}}bg-emerald-100 text-emerald-700{{end}}">
                                    {{if eq .Category "real-estate"}}🏠 Real Estate{{else}}💼 Gig Economy{{end}}
                                </span>
                                <span class="text-xs text-slate-400">{{.Timestamp}}</span>
                            </div>
                            <h2 class="text-xl font-bold text-slate-900 mb-2">{{.Title}}</h2>
                            <p class="text-slate-600 leading-relaxed">{{.Content}}</p>
                        </div>
                        <div class="ml-4">
                            <button onclick="likeNews({{.ID}}, this)" 
                                    class="flex items-center gap-2 text-slate-400 hover:text-red-500 transition">
                                ❤️ <span class="text-sm font-medium">{{.Likes}}</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            {{else}}
            <div class="bg-white rounded-2xl p-8 text-center text-slate-400">
                No news available
            </div>
            {{end}}
        </div>
    </div>

    <script>
        function likeNews(id, btn) {
            fetch('/news/like/' + id, { method: 'POST' })
                .then(res => res.text())
                .then(likes => {
                    const span = btn.querySelector('span');
                    if (span) span.textContent = likes;
                    btn.classList.add('text-red-500');
                })
                .catch(err => console.error(err));
        }
    </script>
</body>
</html>
