<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Forgot Password - metropages</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-[#1d9bf0]">metropages</h1>
                <p class="text-slate-500 text-sm mt-1">Reset your password</p>
            </div>
            
            <form hx-post="/forgot-password" hx-target="#result" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                </div>
                <button type="submit" class="w-full bg-[#1d9bf0] text-white font-semibold py-2 rounded-xl hover:bg-[#1a8cd8] transition">Send Reset Link</button>
            </form>
            
            <div id="result" class="mt-4"></div>
            
            <div class="text-center mt-6">
                <a href="/" class="text-sm text-[#1d9bf0] hover:underline">← Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
