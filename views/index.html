<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>News Feed - metropages</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .metro-brand { font-weight: 900; letter-spacing: -2.5px; text-transform: lowercase; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="max-w-4xl mx-auto p-4">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="metro-brand text-3xl text-[#1d9bf0]">metropages</h1>
                <p class="text-sm text-slate-500">News & Updates</p>
            </div>
            <a href="/" class="bg-[#1d9bf0] text-white px-4 py-2 rounded-full hover:bg-[#1a8cd8] transition text-sm">← Back Home</a>
        </div>
        
        <div class="space-y-4">
            {{range .News}}
            <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-100">
                <div class="flex justify-between items-start mb-2">
                    <h2 class="text-lg font-bold">{{.Title}}</h2>
                    <span class="text-xs text-slate-400">{{.Timestamp}}</span>
                </div>
                <p class="text-slate-600 text-sm mb-3">{{.Content}}</p>
                <div class="flex justify-between items-center">
                    <span class="text-xs bg-slate-100 px-2 py-1 rounded-full">{{.Category}}</span>
                    <button hx-post="/news/like/{{.ID}}" hx-swap="outerHTML" class="flex items-center gap-1 text-sm text-slate-500 hover:text-red-500">
                        ❤️ <span class="font-medium">{{.Likes}}</span>
                    </button>
                </div>
            </div>
            {{else}}
            <div class="bg-white rounded-xl p-8 text-center text-slate-400">No news articles yet.</div>
            {{end}}
        </div>
    </div>
</body>
</html>
